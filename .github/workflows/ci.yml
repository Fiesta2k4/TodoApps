name: TodoApps CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      commit_sha:
        description: Commit SHA from DATN trigger
        required: false
        type: string
      source:
        description: Trigger source
        required: false
        type: string
      reason:
        description: Trigger reason
        required: false
        type: string

jobs:
  node-smoke:
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        env:
          MONGO_INITDB_ROOT_USERNAME: root
          MONGO_INITDB_ROOT_PASSWORD: example
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.adminCommand({ ping: 1 }).ok' || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 6
    env:
      PORT: 3000
      MONGODB_URI: mongodb://root:example@127.0.0.1:27017/todos?authSource=admin
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Start app
        run: |
          nohup npm start > server.log 2>&1 &
          echo $! > server.pid

      - name: Wait for app and verify endpoints
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:3000/api/todos >/dev/null; then
              echo "App is ready"
              exit 0
            fi
            sleep 2
          done

          echo "App failed to start"
          cat server.log
          exit 1

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t todoapps:ci .